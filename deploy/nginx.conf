# Nginx inside LXC — behind Nginx Proxy Manager (SSL terminates on NPM)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name trainer.izostudia.net _;

    # Let's Encrypt (only if certbot used directly on this host; skip if SSL is on NPM)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
    }

    location / {
        root /opt/izo-coach/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
